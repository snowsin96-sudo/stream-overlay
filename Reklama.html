<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Right Slide Ad</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: transparent;
    font-family: Arial, sans-serif;
}

/* Box */
#adBox {
    position: absolute;
    bottom: 60px;
    right: -400px; /* start van ekrana DESNO */
    background: rgba(15, 15, 30, 0.9);
    color: white;
    padding: 18px 30px;
    border-radius: 80px; /* 🔥 zaobljene ivice */
    font-size: 22px;
    opacity: 0;

    backdrop-filter: blur(8px);

    box-shadow:
        0 0 20px rgba(0, 234, 255, 0.5),
        0 0 40px rgba(0, 234, 255, 0.2);

    transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}

/* kad se pojavi */
#adBox.show {
    right: 50px; /* ulazi u ekran */
    opacity: 1;
}

/* glow tekst */
.highlight {
    color: #00eaff;
    font-weight: bold;
    text-shadow: 0 0 10px #00eaff, 0 0 20px #00eaff;
}

/* linija dole */
.bar {
    margin-top: 8px;
    height: 3px;
    width: 100%;
    background: linear-gradient(90deg, transparent, #00eaff);
    border-radius: 10px;
}
</style>
</head>

<body>

<div id="adBox">
    🔥 Support stream! <span class="highlight">Follow & Tap</span> 💙
    <div class="bar"></div>
</div>

<script>
const ad = document.getElementById("adBox");

function showAd() {
    ad.classList.add("show");

    setTimeout(() => {
        ad.classList.remove("show");
    }, 5000);
}

// na svakih 120 sekundi
setInterval(showAd, 120000);

// prvi put brzo
setTimeout(showAd, 5000);
</script>

</body>
</html>
